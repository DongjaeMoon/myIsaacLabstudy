recorders:
  dataset_file_handler_class_type: isaaclab.utils.datasets.hdf5_dataset_file_handler:HDF5DatasetFileHandler
  dataset_export_dir_path: /tmp/isaaclab/logs
  dataset_filename: dataset
  dataset_export_mode:
    _value_: 1
    _name_: EXPORT_ALL
    _sort_order_: 1
  export_in_record_pre_reset: true
  export_in_close: false
observations:
  policy:
    concatenate_terms: true
    concatenate_dim: -1
    enable_corruption: false
    history_length: null
    flatten_history_dim: true
    robot_proprio:
      func: UROP_carry_v4.mdp.observations:robot_proprio
      params:
        include_torque: true
        torque_scale: 0.0125
      modifiers: null
      noise: null
      clip: null
      scale: null
      history_length: 0
      flatten_history_dim: true
    carry_command:
      func: UROP_carry_v4.mdp.observations:carry_command
      params: {}
      modifiers: null
      noise: null
      clip: null
      scale: null
      history_length: 0
      flatten_history_dim: true
    prev_actions:
      func: UROP_carry_v4.mdp.observations:prev_actions
      params: {}
      modifiers: null
      noise: null
      clip: null
      scale: null
      history_length: 0
      flatten_history_dim: true
    object_rel:
      func: UROP_carry_v4.mdp.observations:object_rel_state
      params:
        pos_scale: 1.0
        vel_scale: 1.0
        noise_std: 0.0
        clip: 5.0
      modifiers: null
      noise: null
      clip: null
      scale: null
      history_length: 0
      flatten_history_dim: true
  critic:
    concatenate_terms: true
    concatenate_dim: -1
    enable_corruption: false
    history_length: null
    flatten_history_dim: true
    robot_proprio:
      func: UROP_carry_v4.mdp.observations:robot_proprio
      params:
