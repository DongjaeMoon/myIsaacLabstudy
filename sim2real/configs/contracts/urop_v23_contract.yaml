timing:
  sim_dt: 0.01
  decimation: 2
  policy_dt: 0.02
  episode_length_s: 5.8
camera:
  actor_object_frame: opencv_optical
  object_terms_zero_when_invisible: true
  tag_visible_dim: 1
  training_camera_parent:
  - torso_link
  - torso
  training_camera_translation:
  - 0.05762
  - 0.01753
  - 0.42987
  training_camera_quat_wxyz:
  - 0.91496
  - 0.0
  - 0.40355
  - 0.0
  training_camera_convention: quat_wxyz_opencv_optical
  runtime_object_observation_frame: camera_opencv_raw
runtime_notes:
  empirical_normalization: true
  requires_exported_torchscript: true
  object_source_for_real: apriltag_zmq
  notes:
  - No robot command is executed by check-only/tools.
  - Use exported/policy.pt TorchScript; do not use model_*.pt checkpoints.
  - Verify projected_gravity/base_ang_vel axes in obs-only before enabling policy.
