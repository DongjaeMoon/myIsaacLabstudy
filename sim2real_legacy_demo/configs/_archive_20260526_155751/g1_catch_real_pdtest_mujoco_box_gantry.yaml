policy_runtime:
  autonomous_key: a
  manual_debug_key: k
  policy_mode_name: catch
  default_policy_reference_pose: catch_ready
  auto_start_after_ready: false
  object_source: mujoco_udp
  fake_object_debug: false
  gate_policy_until_object_visible: false
  object_visible_blend_duration_s: 0.4
  gantry_upper_body_only: true
  gantry_lower_body_action_scale: 0.0
  gantry_upper_body_action_scale: 1.0
observation:
  contract_name: real_catch_v1
  num_obs: 104
  frame: policy_body
  use_torque_obs: false
  use_base_linear_velocity_obs: false
  q_reference: current_mode_reference_pose
  terms:
  - name: projected_gravity
    dim: 3
    source: imu
    scale: 1.0
  - name: base_ang_vel
    dim: 3
    source: imu_gyro
    scale: 1.0
  - name: joint_pos_rel
    dim: 29
    source: lowstate_q_minus_q_ref
    scale: 1.0
  - name: joint_vel
    dim: 29
    source: lowstate_dq
    scale: 0.05
  - name: previous_action
    dim: 29
    source: previous_policy_action
    scale: 1.0
  - name: object_rel_pos
    dim: 3
    source: apriltag_estimator
    scale: 1.0
  - name: object_rel_lin_vel
    dim: 3
    source: apriltag_estimator
    scale: 1.0
  - name: tag_visible
    dim: 1
    source: apriltag_estimator
    scale: 1.0
  - name: mode_one_hot
    dim: 4
    source: mode_machine
    scale: 1.0
modes:
  names:
  - safe_stand
  - catch_ready
  - catch
  - hold
  initial: safe_stand
  keyboard:
    safe_stand: s
    catch_ready_primary: p
    catch_ready_secondary: c
    catch: k
    hold: h
    damping: d
    exit_primary: q
    exit_secondary: esc
  transitions:
    default_pose_transition_duration_s: 3.0
    catch_ready_to_catch_duration: 0.2
    catch_to_hold_after_tag_lost_s: 0.5
    hold_duration_for_success_s: 2.0
camera:
  enabled: false
  server_address: 192.168.123.164
  port: 5555
  image_show: false
  intrinsics_yaml: sim2real/calib/head_camera_intrinsics.example.yaml
  extrinsics_yaml: sim2real/calib/head_camera_extrinsics.example.yaml
  tag_yaml: sim2real/calib/box_tag_config.example.yaml
  estimator:
    lost_timeout_s: 0.2
    min_valid_detections: 3
    velocity_filter_alpha: 0.35
virtual_object:
  enabled_when_no_camera: true
  initial_pos_base:
  - 1.5
  - 0.0
  - 0.4
  initial_vel_base:
  - -2.5
  - 0.0
  - 0.0
safety:
  damping_on_exit: true
  damping_kd: 8.0
  clamp_action: true
  clamp_joint_targets_to_limits: false
  max_target_delta_per_control_step: 0.01
  max_target_delta_per_policy_step: 0.04
  lowstate_timeout_s: 0.1
  max_abs_joint_velocity_warn: 20.0
  max_abs_action_warn: 0.95
  emergency_gravity_z_min: -0.3
